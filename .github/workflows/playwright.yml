name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Select browser to run tests'
        required: true
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit

jobs:
  public-smoke:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser - ${{ github.event.inputs.browser || 'chromium' }}
        run: npx playwright install --with-deps ${{ github.event.inputs.browser || 'chromium' }}

      - name: Run public smoke suite
        run: npm run test:public-smoke
        env:
          CI: true

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results and traces
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30

      - name: Generate AI-assisted failure triage
        if: failure()
        run: npx ts-node scripts/analyseFailures.ts
        env:
          CI: true
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload AI-assisted triage report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: ai-failure-analysis
          path: test-results/ai-failure-analysis.md
          retention-days: 30

  auth-smoke:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    env:
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CI: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Check auth credentials
        id: auth-check
        run: |
          if [ -n "$TEST_USER_EMAIL" ] && [ -n "$TEST_USER_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Auth credentials are not configured. Skipping auth smoke suite."
          fi

      - name: Install dependencies
        if: steps.auth-check.outputs.available == 'true'
        run: npm ci

      - name: Install Playwright chromium
        if: steps.auth-check.outputs.available == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run auth smoke suite
        if: steps.auth-check.outputs.available == 'true'
        run: npm run test:auth-smoke

      - name: Upload auth smoke report
        if: ${{ steps.auth-check.outputs.available == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-auth
          path: playwright-report/
          retention-days: 30

      - name: Upload auth smoke results
        if: ${{ steps.auth-check.outputs.available == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: test-results-auth
          path: test-results/
          retention-days: 30
